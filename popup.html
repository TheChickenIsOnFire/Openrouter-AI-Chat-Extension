<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OpenRouter Chat Extension</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #212121;
        color: #eee;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
      }
      button {
        background: #58a6ff;
        border: none;
        padding: 8px 12px;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #4592e6;
      }
    </style>
  </head>
  <body>
    <h1>OpenRouter Chat Extension</h1>
    <p>Click the floating AI button on any page to open the chat UI.</p>
    <button onclick="window.close()">Close</button>
  </body>
</html>
